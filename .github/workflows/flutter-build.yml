# Build the native artifacts that the `experimental/flutter_plugin/hidden_volume`
# Flutter plugin consumes:
#   * Android — `libhidden_volume_ffi.so` × 4 ABIs (arm64-v8a,
#     armeabi-v7a, x86_64, x86) on an Ubuntu runner with the NDK
#     auto-installed.
#   * iOS — `HiddenVolumeFFI.xcframework` (arm64 device + arm64/x86_64
#     simulator slices) on a macOS runner with Xcode preinstalled.
#
# Both jobs upload the artifacts to the workflow run; downstream
# consumers can grab them via `gh run download`.
#
# Trigger policy (set by maintainer 2026-05-09):
#   - Push of a SemVer tag `v*.*.*` — produces the release artifacts
#     to attach to the GitHub release for that tag.
#   - Manual dispatch — for ad-hoc native rebuilds (e.g. validating
#     a `cargo-ndk` toolchain bump on a feature branch before tag).
#
# **Branch pushes, pull-requests, and the `release: published`
# event do NOT trigger this workflow.** Local builds via
# `scripts/build-android.sh` / `scripts/build-ios.sh` cover the
# inner-loop. CI exists to validate the tagged artifact.

name: flutter-build

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch: {}

jobs:
  android:
    name: android-${{ matrix.abi }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi:
          - arm64-v8a
          - armeabi-v7a
          - x86_64
          - x86
    steps:
      - uses: actions/checkout@v4

      - name: install rust + targets
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add aarch64-linux-android \
                            armv7-linux-androideabi \
                            x86_64-linux-android \
                            i686-linux-android

      - name: setup android NDK r26
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          link-to-sdk: true

      - name: install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: build cdylib for ${{ matrix.abi }}
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
          ABIS: ${{ matrix.abi }}
        run: ./scripts/build-android.sh

      - name: upload .so artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.abi }}-cdylib
          path: experimental/flutter_plugin/hidden_volume/android/src/main/jniLibs/${{ matrix.abi }}/libhidden_volume_ffi.so
          if-no-files-found: error
          retention-days: 14

  android-bindings:
    name: android-kotlin-bindings
    needs: android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install rust
        run: rustup toolchain install stable --profile minimal
      - name: build host cdylib (for uniffi-bindgen --library)
        run: cargo build -p hidden-volume-ffi --release
      - name: regenerate kotlin binding
        run: |
          cargo run --bin uniffi-bindgen --features bindgen-cli \
            -p hidden-volume-ffi -- generate \
            --library target/release/libhidden_volume_ffi.so \
            --language kotlin --out-dir bindings/kotlin
      - name: upload kotlin binding
        uses: actions/upload-artifact@v4
        with:
          name: android-kotlin-binding
          path: bindings/kotlin/uniffi/
          if-no-files-found: error
          retention-days: 14

  ios:
    name: ios-xcframework
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: install rust + ios targets
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add aarch64-apple-ios \
                            aarch64-apple-ios-sim \
                            x86_64-apple-ios

      - name: build host dylib (for uniffi-bindgen --library)
        run: cargo build -p hidden-volume-ffi --release

      - name: regenerate swift binding
        run: |
          cargo run --bin uniffi-bindgen --features bindgen-cli \
            -p hidden-volume-ffi -- generate \
            --library target/release/libhidden_volume_ffi.dylib \
            --language swift --out-dir bindings/swift

      - name: build per-target staticlibs + xcframework
        run: ./scripts/build-ios.sh

      - name: upload xcframework
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcframework
          path: experimental/flutter_plugin/hidden_volume/ios/HiddenVolumeFFI.xcframework
          if-no-files-found: error
          retention-days: 14

      - name: upload swift binding
        uses: actions/upload-artifact@v4
        with:
          name: ios-swift-binding
          path: bindings/swift/
          if-no-files-found: error
          retention-days: 14
