# cargo-deny configuration. Run `cargo deny check` locally; CI runs it
# on every push (.github/workflows/ci.yml).
#
# Policy goals:
#  1. Refuse to ship if any dependency has a known security advisory.
#  2. Refuse to ship if any dependency uses an incompatible license.
#  3. Refuse to ship if multiple versions of the same crate end up in
#     the dependency graph (bloat + version-skew bug surface).
#  4. Refuse to depend on git / path sources outside the workspace
#     (must be from crates.io or our own workspace).

[graph]
# Cover all targets the crate is tested against in CI. Keeps Linux,
# macOS, and Windows resolution all in scope.
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
]
all-features = true

[output]
feature-depth = 1

# ---------------------------------------------------------------- Advisories.

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    # NB: previous advisory ignores were retired once their targets
    # left the dependency tree:
    #
    # - RUSTSEC-2025-0141 (`bincode 1.3.3`) — dropped when the
    #   workspace moved to uniffi 0.31 (replaces bincode with
    #   postcard).
    # - RUSTSEC-2024-0436 (`paste 1.0.15` unmaintained) — dropped
    #   2026-05-28 (audit pass 19 follow-through): `cargo deny`
    #   started reporting `advisory-not-detected` because `paste`
    #   is no longer in the workspace dep tree. Removing the
    #   ignore avoids the dead-config warning; if `paste` returns
    #   as a transitive dep, re-add the ignore alongside a
    #   replacement plan.
]

# ---------------------------------------------------------------- Licenses.

[licenses]
version = 2
# Crates we accept. Restrictive on purpose — adding a new license
# requires explicit review (this list IS the policy).
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    # Public-domain-equivalent that some crates (e.g. zerocopy) use.
    "CC0-1.0",
    # MPL is reciprocal but compatible with our MIT/Apache dual-license.
    "MPL-2.0",
    # `ISC`, `Unicode-DFS-2016`, `Zlib` were preemptively allowed but
    # no current dep uses them; pruned to keep the policy table tight
    # to actual usage (cargo-deny `unused-allowed-license` warning).
]
confidence-threshold = 0.95
exceptions = []

# ---------------------------------------------------------------- Bans / dups.

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
# Allow specific intentional duplicates if any arise; empty for now.
allow = []
deny = [
    # Rule out openssl-style runtime crypto if it ever shows up. The
    # crate uses RustCrypto exclusively.
    { name = "openssl" },
    { name = "openssl-sys" },
    { name = "native-tls" },
]
# Transitive duplicate versions we cannot dedupe ourselves — they are
# pulled in at conflicting versions by upstream crates and will collapse
# once those crates align on a single version. Tracked for removal on
# each dependency bump.
skip = [
    { name = "cpufeatures" },    # transitive duplicate pending upstream alignment
    { name = "getrandom" },      # transitive duplicate pending upstream alignment
    { name = "thiserror" },      # transitive duplicate pending upstream alignment
    { name = "thiserror-impl" }, # proc-macro companion of thiserror; same dup
    { name = "winnow" },         # transitive duplicate pending upstream alignment
]
skip-tree = []

# ---------------------------------------------------------------- Sources.

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
